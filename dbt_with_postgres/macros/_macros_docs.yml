version: 2

macros:
  - name: cents_to_dollars
    description: >
      A macro that converts cents to dollars and rounds to the user input decimal
      places, or 2 if none is provided.
    arguments:
      - name: column_name
        type: string
        description: The name of the column you want to convert.
      - name: decimals
        type: integer
        description: Number of decimal places, defaults to 2
  - name: grant_select
    description: Macro that grants select privs on target.schema (s) to target.user unless otherwise especified.
    arguments:
      - name: schema
        type: string
        description: The name of the schema.
      - name: user
        type: string
        description: User to grant select privs.
